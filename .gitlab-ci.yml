# The Docker image that will be used to build your app
image: python:3.8

before_script:
  - pip install pyyaml mkdocs

pages:
  script:
    - mkdocs build -f mkdocs.yml -d public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME == "develop"'
