<body>

	<div class="container-fluid">
		<h2>Variables Table</h2>
		<div class="row">
			
				<div class="col-sm-11 small" style="" id="buttons">
			<button onclick="stop()">Stop</button>

			<button onclick="docontinue()">Continue</button>
		</div>
		</div>
		<div class="row">
			<div class="col-sm-11 small" style="" id="table"></div>
		</div>
		<!-- <button onclick="getTable()">update table</button> --->


	<div>
	
		<a href="javascript:;" onclick="openModbusPage()">Modbus table</a>
	
		</div>
	
	</div>







	<script type="text/javascript">
	function openModbusPage() {
		const s="http://"+window.location.hostname+":"+window.location.port+"/modbustable.html"
		window.open(s, '_blank');
		
	}

	
	function start() {
		const s=window.location.hostname+':'+window.location.port;
		
		const Http = new XMLHttpRequest();
		const url='http://'+s+'/core?command=start';
		Http.open("GET", url);
		Http.send();
		
	}
		function stop() {
			const s=window.location.hostname+':'+window.location.port;
			
			const Http = new XMLHttpRequest();
			const url='http://'+s+'/core?command=stop';
			Http.open("GET", url);
			Http.send();
			
		}
		
		function docontinue() {
			const s=window.location.hostname+':'+window.location.port;
			
			const Http = new XMLHttpRequest();
			const url='http://'+s+'/core?command=restart';
			Http.open("GET", url);
			Http.send();
			
		}

		function getTable() {
			const s=window.location.hostname+':'+window.location.port;
			//console.log(window.location.hostname+':'+window.location.port);
			fetch('http://'+s+'/vars')
			.then((resp) => resp.json()) 
			.then(function(data) {
				console.log(JSON.stringify(JSON.stringify(data)));
				rows=data;
				console.log(rows);
				//console.log(response.json());
				//rows=response.json();
				updateTableDiv(rows);
				return rows;
			}).then(function(myJson) {
				//console.log(JSON.stringify(myJson));
			});
		}

		function updateTable(msg) {
			getTable();
		}
		
		function updateTableDiv(rows) {
			var html = "<table border='1|1' cellpadding=\"100\" >";
			for (var i = 0; i < rows.length; i++) {
				html += "<tr>";
				html += "<td>&nbsp;" + rows[i].name + " &nbsp;</td>";
				html += "<td>&nbsp; " + rows[i].value + "&nbsp;"+" </td>";
				if (rows[i].editable=="true") {
					html += "<td><button style='background-color: #008CBA;' onclick=updateValue('"+rows[i].name+"',"+rows[i].value+")>Edit</button></td>"
				}
				else {
					html += "<td></td>"
				}
				
				html += "</tr>";

			}
			html += "</table>";
			//console.log(html);
			document.getElementById("table").innerHTML = html;
		}

		
		var webSocket = new WebSocket("ws://" + location.hostname + ":" + location.port + "/chat");
		webSocket.onmessage = function (msg) { updateTable(msg); };
		webSocket.onclose = function () { alert("WebSocket connection closed") };

		
		function updateValue(address,value) {
			console.log(address);
			var x=prompt("New value (decimal)", value);
			if (x == null || x == "") {
			    txt = "User cancelled the prompt.";
			  } else {
				  const s=window.location.hostname+':'+window.location.port;
					//console.log(window.location.hostname+':'+window.location.port);
					fetch('http://'+s+'/setvar?'+address+"="+x)
					
			  }
			
			
			console.log(x);
			
		}
		
		
	
		
	</script>
</body>
