//plugins {
//    id 'org.owasp.dependencycheck' version '10.0.3'
//}

apply plugin: 'java'
apply plugin: 'application'
apply plugin : 'jacoco'

repositories {
    // Use Maven Central for resolving dependencies.
    gradlePluginPortal()
    mavenCentral()

}
dependencies {
    // Lombok annotations
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'

    // Test dependencies
    testImplementation 'com.github.tomakehurst:wiremock-jre8:3.0.1' // dates 08/2023 . migrated to org.wiremock:wiremock
    testImplementation 'org.mockito:mockito-core:5.12.0'
//    testImplementation 'junit:junit:4.13.2' //migrated to org.junit.jupiter:junit-jupiter-api
    implementation 'org.junit.jupiter:junit-jupiter-api:5.11.0-M2'
    implementation 'org.junit.jupiter:junit-jupiter-engine:5.11.0-M2'

    // JWT dependencies
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    implementation 'io.jsonwebtoken:jjwt-impl:0.12.6'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Various dependencies
    implementation 'ch.qos.logback:logback-classic:1.5.11'
    implementation 'ch.qos.logback:logback-core:1.5.11'
    implementation 'commons-codec:commons-codec:1.17.1'
    implementation 'com.clumd.projects:java-json:1.2.1'
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.17.1'
    implementation 'com.fasterxml.jackson.core:jackson-core:2.17.1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.1'
    implementation 'com.google.code.gson:gson:2.11.0'
    implementation 'com.google.guava:guava:33.3.1-jre'
    implementation 'com.jcraft:jsch:0.1.55'   // dates from 2018, needs update=. ssh. migrated to com.github.mwiede:jsch
    implementation 'com.neuronrobotics:nrjavaserial:5.2.1'   // last update 05/2020. error in import org.apache.commons.net.util.SubnetUtils;
    implementation 'com.sun.jna:jna:3.0.9'   // dates from 2010, needs updating. access to native shared libraries : migrated to 'net.java.dev.jna:jna:3.0.9'
    implementation 'io.jsonwebtoken:jjwt:0.12.6'  // migrated to io.jsonwebtoken:jjwt-api
    implementation 'io.micrometer:micrometer-commons:1.13.6'
    implementation 'io.micrometer:micrometer-observation:1.13.6'
    implementation 'org.apache.commons:commons-lang3:3.17.0'
    implementation 'org.apache.httpcomponents:fluent-hc:4.5.14' // last update 11/2022
    implementation 'org.apache.httpcomponents:httpclient:4.5.14' // last update 11/2022
    implementation 'org.apache.directory.studio:org.apache.httpcomponents.httpcore:4.1.2'  // last updated 02/2012

    implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5'  //last updated 07/2020
    implementation 'org.json:json:20240303'
    implementation 'org.jetbrains:annotations:24.1.0'
    implementation 'org.lightcouch:lightcouch:0.2.0'  // last update 11/2017
    implementation 'org.mindrot:jbcrypt:0.4'  // psswd hashing, last update 02/2017
    implementation 'org.mongodb:bson:5.1.1'
    implementation 'org.mongodb:mongo-java-driver:3.12.14'  // dates 06/2023. latest version 5.2.0. migrated to org.mongodb:mongodb-driver-sync
    implementation 'org.netbeans.external:org-apache-commons-logging:RELEASE230'
    implementation 'org.springframework:spring-messaging:6.0.23'  // ok up to  6.1.2, but 6.0.23 less vulns
    implementation 'org.springframework:spring-websocket:6.0.23'

    implementation 'org.slf4j:slf4j-api:1.7.32'   // last update 02/2022


    // Use Jetty WebSocket dependencies
    implementation 'org.eclipse.jetty:jetty-server:11.0.24'
    implementation 'org.eclipse.jetty:jetty-servlet:11.0.24'  // upper versions migrated to org.eclipse.jetty.ee10
    implementation 'org.eclipse.jetty:jetty-client:11.0.24'
    implementation 'org.eclipse.jetty.websocket:websocket-jakarta-server:11.0.24'   // not 12.x versions?
    implementation 'org.eclipse.jetty.websocket:websocket-jetty-server:11.0.24'   // not 12.x versions?
//    implementation 'org.eclipse.jetty.websocket:websocket-jakarta-client:11.0.24'
//    implementation 'org.eclipse.jetty.websocket:websocket-core-client:11.0.24'
//    implementation 'org.eclipse.jetty.websocket:websocket-servlet:11.0.24'
//    implementation 'org.eclipse.jetty.websocket:websocket-jetty-client:11.0.24'
    implementation 'org.eclipse.jetty:jetty-util:11.0.24'

    implementation 'jakarta.websocket:jakarta.websocket-api:2.0.0' // Updated for Jakarta EE

    // logs
    implementation 'net.logstash.logback:logstash-logback-encoder:8.0'

    // excel reading/parsing
    implementation 'org.apache.poi:poi:5.3.0' // For .xls files (HSSF)
    implementation 'org.apache.poi:poi-ooxml:5.3.0' // For .xlsx files (XSSF)
//    implementation 'org.apache.poi:poi-ooxml-schemas:5.2.3'
    implementation 'org.apache.poi:poi-scratchpad:5.3.0' // For additional formats (optional)
    implementation 'org.apache.commons:commons-collections4:4.5.0-M2' // Latest
    implementation 'commons-io:commons-io:2.16.1'

    implementation 'commons-net:commons-net:3.9.0'




}

sourceSets{
    main{
        java{
            srcDirs 'lib/unpacked'
        }
    }
}
task buildAndRun {
    dependsOn 'build' // Ensures 'build' task is executed first

    doLast {
        // Run the Java application

    }
}


// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    sourceCompatibility = '17'
    targetCompatibility = '17'

}

//tasks.withType(JavaCompile) {
//    options.compilerArgs << '-Xlint:deprecation' // Add the -Xlint flag to the compiler arguments
//}

run{
    systemProperty 'logback.configurationFile', './src/main/resources/logback.xml'
    systemProperty 'javax.net.ssl.trustStore', './cacerts.jks'
    systemProperty 'javax.net.ssl.trustStorePassword', 'changeit'

//    jvmArgs = ['-Xlint:deprecation']
}

test{
    useJUnitPlatform()
    onlyIf {
        !project.hasProperty('test.skip') || !project.getProperty('test.skip').toBoolean()
    }
}
jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
    }
}

task printEnvVariables {
    doLast {
        println "JAVA_HOME: ${System.getenv('JAVA_HOME')}"
    }
}
