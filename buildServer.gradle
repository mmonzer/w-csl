plugins{
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.0.0'
}

apply from : 'build.gradle'

def mainClassName = 'main.CSLIDSMainServer'
def jarName = 'cslmainserver'

application {
    mainClass = mainClassName
}

shadowJar {
    archiveBaseName.set(jarName)
    mergeServiceFiles()
    configurations = [project.configurations.runtimeClasspath]  // Ensure it captures all runtime dependencies
    manifest {
        attributes 'Main-Class': mainClassName
    }
}
