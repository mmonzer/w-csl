	<script type="text/javascript">
	
		function openVariablesPage() {
			const s="http://"+window.location.hostname+":"+window.location.port+"/variables.html"
			window.open(s, '_blank');
			
		}
	
		function getTable() {

			const s=window.location.hostname+':'+window.location.port;
			//console.log(window.location.hostname+':'+window.location.port);
			fetch('http://'+s+'/modbusvars')
			.then((resp) => resp.json()) 
			.then(function(data) {
				//console.log(JSON.stringify(JSON.stringify(data)));
				rows=data;
				//console.log(rows);

				updateTableDiv(rows);
				return rows;
			}).then(function(myJson) {
				//console.log(JSON.stringify(myJson));
			});
		}

		function updateTable(msg) {
			getTable();
		}
		
		function updateTableDiv(rows) {
			var html = "<table border='1|1' cellpadding=\"100\" >";
			for (var i = 0; i < rows.length; i++) {
				var address=rows[i].name;
				html += "<tr>";
				html += "<td>&nbsp;" + rows[i].name + " &nbsp;</td>";
				html += "<td>&nbsp; " + rows[i].value + "&nbsp; </td>";
				
				html += "<td>&nbsp; " + rows[i].hex + "&nbsp; </td>";
				html += "<td><button style='background-color: #008CBA;' onclick=updateValue("+address+","+rows[i].value+")>Edit</button></td>"
				
				html += "</tr>";

			}
			html += "</table>";
			//console.log(html);
			document.getElementById("table").innerHTML = html;
		}

		function updateValue(address,value) {
			console.log(address);
			var x=prompt("New value (integer)", value);
			if (x == null || x == "") {
			    txt = "User cancelled the prompt.";
			  } else {

					//console.log(window.location.hostname+':'+window.location.port);
					fetch('http://'+s+'/setmodbusvar?'+address+"="+x)
				
			  }
			
			
			console.log(x);
			
		}
		
		
		var webSocket = new WebSocket("ws://" + location.hostname + ":" + location.port + "/chat");
		webSocket.onmessage = function (msg) { updateTable(msg); };
		webSocket.onclose = function () { alert("WebSocket connection closed") };
